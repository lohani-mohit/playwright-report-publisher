name: "Playwright Report Publisher"
description: "Merge Playwright shard reports and publish to GCS, Slack, and GitHub PR comments"
author: "Mohit Lohani"

branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  # Report options
  working-directory:
    description: "Working directory containing Playwright tests"
    required: false
    default: "tests"
  report-directory:
    description: "Directory containing the Playwright HTML report (used when merge-blob-reports is false)"
    required: false
    default: "playwright-report"
  merge-blob-reports:
    description: "Whether to merge sharded blob reports into HTML + JSON before publishing"
    required: false
    default: "false"
  blob-report-path:
    description: "Path to blob reports directory (relative to working-directory). Used when merge-blob-reports is true"
    required: false
    default: "all-blob-reports"
  suite-name:
    description: "Name of the test suite (shown in Slack, PR comments, and step summary)"
    required: false
    default: "Playwright"
  test-status:
    description: "Test result status: 'passed', 'failed', or 'cancelled'. Auto-detected from report if not provided"
    required: false
    default: ""

  # GCS options
  upload-to-gcs:
    description: "Whether to upload the HTML report to GCS"
    required: false
    default: "true"
  gcs-bucket:
    description: "GCS bucket name (without gs:// prefix)"
    required: false
    default: ""
  gcs-path-prefix:
    description: "Path prefix within the GCS bucket. Final path: {prefix}/{timestamp}/"
    required: false
    default: "test-report"
  environment:
    description: "Environment name (appended to GCS path: {prefix}-{env}/{timestamp}/)"
    required: false
    default: "dev"
  gcp-sa-key:
    description: "GCP service account key (JSON) for GCS uploads"
    required: false
    default: ""
  gcp-project-id:
    description: "GCP project ID"
    required: false
    default: ""
  report-base-url:
    description: "Custom base URL for report links (e.g. https://reports.example.com). Defaults to https://storage.googleapis.com/{gcs-bucket}"
    required: false
    default: ""

  # Notification targets
  post-to:
    description: "Where to post results: 'github', 'slack', 'both', or 'none'"
    required: false
    default: "both"
  slack-notify:
    description: "When to send Slack alerts: 'always', 'on-failure', 'on-success', 'never'"
    required: false
    default: "always"
  slack-webhook-url:
    description: "Slack incoming webhook URL"
    required: false
    default: ""
  github-token:
    description: "GitHub token for PR comments"
    required: false
    default: ${{ github.token }}

  # Step summary
  github-step-summary:
    description: "Whether to write a GitHub Actions step summary"
    required: false
    default: "true"

outputs:
  report-url:
    description: "URL to the published Playwright report"
    value: ${{ steps.generate-paths.outputs.report-url }}
  test-status:
    description: "Status of the tests (passed/failed/cancelled)"
    value: ${{ steps.check-status.outputs.status }}
  total-tests:
    description: "Total number of tests"
    value: ${{ steps.parse-results.outputs.total }}
  passed-tests:
    description: "Number of passed tests"
    value: ${{ steps.parse-results.outputs.passed }}
  failed-tests:
    description: "Number of failed tests"
    value: ${{ steps.parse-results.outputs.failed }}
  flaky-tests:
    description: "Number of flaky tests"
    value: ${{ steps.parse-results.outputs.flaky }}
  skipped-tests:
    description: "Number of skipped tests"
    value: ${{ steps.parse-results.outputs.skipped }}
  duration:
    description: "Total test duration in seconds"
    value: ${{ steps.parse-results.outputs.duration }}

runs:
  using: "composite"
  steps:
    # ── Step 1: Merge blob reports (optional) ──────────────────────────────
    - name: Merge blob reports into HTML
      if: inputs.merge-blob-reports == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx playwright merge-reports --reporter html ./${{ inputs.blob-report-path }}

    - name: Merge blob reports into JSON
      if: inputs.merge-blob-reports == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        mkdir -p ${{ inputs.report-directory }}
        npx playwright merge-reports --reporter json ./${{ inputs.blob-report-path }} > ${{ inputs.report-directory }}/pw_report.json

    # ── Step 2: Parse test results from JSON report ────────────────────────
    - name: Parse test results
      id: parse-results
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        REPORT_JSON="${{ inputs.report-directory }}/pw_report.json"
        if [ -f "$REPORT_JSON" ]; then
          eval "$(node -e "
            const r = JSON.parse(require('fs').readFileSync('$REPORT_JSON', 'utf8'));
            const s = r.stats;
            console.log('TOTAL=' + (s.expected + s.unexpected + s.flaky + (s.skipped || 0)));
            console.log('PASSED=' + s.expected);
            console.log('FAILED=' + s.unexpected);
            console.log('FLAKY=' + s.flaky);
            console.log('SKIPPED=' + (s.skipped || 0));
            console.log('DURATION=' + (s.duration / 1000).toFixed(2));
          ")"
        else
          echo "::warning::No pw_report.json found at $REPORT_JSON — test stats will be unavailable"
          TOTAL=0; PASSED=0; FAILED=0; FLAKY=0; SKIPPED=0; DURATION="0"
        fi
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "flaky=$FLAKY" >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
        echo "duration=$DURATION" >> $GITHUB_OUTPUT

    # ── Step 3: Determine test status ──────────────────────────────────────
    - name: Check test status
      id: check-status
      shell: bash
      run: |
        if [ -n "${{ inputs.test-status }}" ]; then
          echo "status=${{ inputs.test-status }}" >> $GITHUB_OUTPUT
        elif [ "${{ steps.parse-results.outputs.failed }}" -gt 0 ] 2>/dev/null; then
          echo "status=failed" >> $GITHUB_OUTPUT
        elif [ "${{ steps.parse-results.outputs.total }}" -gt 0 ] 2>/dev/null; then
          echo "status=passed" >> $GITHUB_OUTPUT
        else
          echo "status=unknown" >> $GITHUB_OUTPUT
        fi

    # ── Step 4: GCS upload ─────────────────────────────────────────────────
    - name: Setup GCP authentication
      if: inputs.upload-to-gcs == 'true' && inputs.gcp-sa-key != ''
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ inputs.gcp-sa-key }}

    - name: Set up Google Cloud SDK
      if: inputs.upload-to-gcs == 'true' && inputs.gcp-sa-key != ''
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ inputs.gcp-project-id }}

    - name: Validate GCS configuration
      if: inputs.upload-to-gcs == 'true' && inputs.gcp-sa-key != ''
      shell: bash
      run: |
        if [ -z "${{ inputs.gcs-bucket }}" ]; then
          echo "::error::gcs-bucket is required when upload-to-gcs is true"
          exit 1
        fi

    - name: Generate paths and upload to GCS
      id: generate-paths
      if: inputs.upload-to-gcs == 'true' && inputs.gcp-sa-key != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        TIMESTAMP=$(date +%s)
        GCS_DIR="${{ inputs.gcs-path-prefix }}-${{ inputs.environment }}/${TIMESTAMP}"
        GCS_PATH="gs://${{ inputs.gcs-bucket }}/${GCS_DIR}"

        BASE_URL="${{ inputs.report-base-url }}"
        if [ -z "$BASE_URL" ]; then
          BASE_URL="https://storage.googleapis.com/${{ inputs.gcs-bucket }}"
        fi
        BASE_URL="${BASE_URL%/}"
        REPORT_URL="${BASE_URL}/${GCS_DIR}/index.html"

        REPORT_DIR="${{ inputs.report-directory }}"
        if [ -d "${REPORT_DIR}/html-report" ]; then
          gsutil -m cp -r "${REPORT_DIR}/html-report/*" "${GCS_PATH}"
        else
          gsutil -m cp -r "${REPORT_DIR}/*" "${GCS_PATH}"
        fi

        echo "report-url=${REPORT_URL}" >> $GITHUB_OUTPUT
        echo "Report uploaded to: ${REPORT_URL}"

    # ── Step 5: Slack notification ─────────────────────────────────────────
    - name: Get last commit message
      id: get-commit
      if: inputs.post-to == 'slack' || inputs.post-to == 'both'
      shell: bash
      run: |
        LAST_COMMIT_MSG=$(git log -1 --pretty=format:'%s' 2>/dev/null || echo "N/A")
        echo "last-commit=${LAST_COMMIT_MSG}" >> $GITHUB_OUTPUT

    - name: Post test results to Slack
      if: (inputs.post-to == 'slack' || inputs.post-to == 'both') && inputs.slack-webhook-url != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: node ${{ github.action_path }}/scripts/post-to-slack.js
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.slack-webhook-url }}
        SLACK_NOTIFY_MODE: ${{ inputs.slack-notify }}
        REPORT_URL: ${{ steps.generate-paths.outputs.report-url }}
        LAST_COMMIT_MSG: ${{ steps.get-commit.outputs.last-commit }}
        TEST_STATUS: ${{ steps.check-status.outputs.status }}
        ENVIRONMENT: ${{ inputs.environment }}
        SUITE_NAME: ${{ inputs.suite-name }}
        TOTAL_TESTS: ${{ steps.parse-results.outputs.total }}
        PASSED_TESTS: ${{ steps.parse-results.outputs.passed }}
        FAILED_TESTS: ${{ steps.parse-results.outputs.failed }}
        FLAKY_TESTS: ${{ steps.parse-results.outputs.flaky }}
        SKIPPED_TESTS: ${{ steps.parse-results.outputs.skipped }}
        DURATION: ${{ steps.parse-results.outputs.duration }}
        GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    # ── Step 6: GitHub PR comment ──────────────────────────────────────────
    - name: Post test results as GitHub PR comment
      if: (inputs.post-to == 'github' || inputs.post-to == 'both') && github.event_name == 'pull_request'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: node ${{ github.action_path }}/scripts/post-to-github.js
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        REPORT_URL: ${{ steps.generate-paths.outputs.report-url }}
        TEST_STATUS: ${{ steps.check-status.outputs.status }}
        PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        SUITE_NAME: ${{ inputs.suite-name }}
        TOTAL_TESTS: ${{ steps.parse-results.outputs.total }}
        PASSED_TESTS: ${{ steps.parse-results.outputs.passed }}
        FAILED_TESTS: ${{ steps.parse-results.outputs.failed }}
        FLAKY_TESTS: ${{ steps.parse-results.outputs.flaky }}
        SKIPPED_TESTS: ${{ steps.parse-results.outputs.skipped }}
        DURATION: ${{ steps.parse-results.outputs.duration }}

    # ── Step 7: GitHub step summary ────────────────────────────────────────
    - name: Write GitHub step summary
      if: inputs.github-step-summary == 'true'
      shell: bash
      env:
        TEST_STATUS: ${{ steps.check-status.outputs.status }}
        SUITE_NAME: ${{ inputs.suite-name }}
        TOTAL_TESTS: ${{ steps.parse-results.outputs.total }}
        PASSED_TESTS: ${{ steps.parse-results.outputs.passed }}
        FAILED_TESTS: ${{ steps.parse-results.outputs.failed }}
        FLAKY_TESTS: ${{ steps.parse-results.outputs.flaky }}
        SKIPPED_TESTS: ${{ steps.parse-results.outputs.skipped }}
        DURATION: ${{ steps.parse-results.outputs.duration }}
        REPORT_URL: ${{ steps.generate-paths.outputs.report-url }}
      run: |
        if [ "$TEST_STATUS" == "failed" ]; then
          STATUS_ICON="❌ Tests Failed"
        elif [ "$TEST_STATUS" == "cancelled" ]; then
          STATUS_ICON="⚠️ Tests Cancelled"
        else
          STATUS_ICON="✅ Tests Passed"
        fi

        cat >> $GITHUB_STEP_SUMMARY << EOF
        ## ${STATUS_ICON} — ${SUITE_NAME}

        | Metric | Value |
        |--------|-------|
        | Total Tests | ${TOTAL_TESTS} |
        | Passed ✅ | ${PASSED_TESTS} |
        | Failed ❌ | ${FAILED_TESTS} |
        | Flaky ⚠️ | ${FLAKY_TESTS} |
        | Skipped ⏭️ | ${SKIPPED_TESTS} |
        | Duration | ${DURATION}s |

        EOF

        if [ -n "$REPORT_URL" ]; then
          echo "**📊 Report:** [View full report](${REPORT_URL})" >> $GITHUB_STEP_SUMMARY
        fi
