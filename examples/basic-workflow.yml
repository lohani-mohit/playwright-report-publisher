name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to test against"
        required: true
        default: "dev"
        type: choice
        options: [dev, preview, prod]

jobs:
  test:
    name: Run Tests and Publish Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # One-step Playwright setup: Node + deps + browser caching
      - uses: lohani-mohit/playwright-report-publisher/setup@v2
        with:
          working-directory: tests
          node-version: "20"

      - name: Run Playwright tests
        id: run-tests
        working-directory: tests
        run: npx playwright test
        continue-on-error: true

      - name: Publish Report
        uses: lohani-mohit/playwright-report-publisher@v2
        with:
          working-directory: tests
          environment: ${{ inputs.environment || 'dev' }}
          gcs-bucket: ${{ vars.GCS_BUCKET }}
          gcs-path-prefix: "e2e-tests"
          post-to: "both"
          gcp-sa-key: ${{ secrets.GCP_SA_KEY }}
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          slack-notify: "on-failure"
          test-status: ${{ steps.run-tests.outcome == 'success' && 'passed' || 'failed' }}
